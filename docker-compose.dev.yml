version: '3.8'

services:
  postgres:
    environment:
      POSTGRES_DB: travelapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=travelapp_db;Username=postgres;Password=Admin
    ports:
      - "5000:8080"
    volumes:
      - ./TravelApp.API/appsettings.Development.json:/app/appsettings.Development.json:ro
